@if (isLoading) {
  <p class="loading-text">Loading…</p>
} @else {
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <span class="field-error">Name is required (max 100 characters).</span>
      }
    </div>

    <div class="form-field">
      <label for="description">Description</label>
      <textarea id="description" rows="2" formControlName="description"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn--ghost" (click)="cancelled.emit()">Cancel</button>
      <button type="submit" class="btn btn--primary" [disabled]="isSaving">
        {{ isSaving ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </form>
}
